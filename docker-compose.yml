services:
  sitesweep:
    # Pulls the multi-arch image (amd64/arm64) published by the GitHub Actions
    # build workflow. To build locally instead, run: docker compose build
    # (uncomment the `build: .` line below).
    image: ghcr.io/catsec/sitesweep:latest
    # build: .
    container_name: sitesweep

    # --- hardening ---
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      # Chromium writes its profile/temp here; HAR uploads are handled in memory.
      - /tmp:size=1g,mode=1777
    privileged: false
    shm_size: "256m"

    environment:
      SITESWEEP_ALLOW_RENDER: "1"     # set "0" to disable headless Chrome
      SITESWEEP_MAX_PAGES: "50"
      SITESWEEP_MAX_HAR_MB: "40"
      SITESWEEP_SCAN_TIMEOUT: "300"
      # Optional — enables the index check when set in .env (see README).
      SERPAPI_KEY: "${SERPAPI_KEY:-}"

    # No host port is published: cloudflared reaches the app over the internal
    # network at http://sitesweep:8000. Uncomment only for local debugging.
    # ports:
    #   - "127.0.0.1:8000:8000"

    # Resource limits use the legacy (non-swarm) keys instead of `deploy.resources`.
    # Synology Container Manager rejects CPU limits set via NanoCPUs ("NanoCPUs can
    # not be set") because its kernel lacks CFS CPU-quota support. `cpu_shares` is a
    # relative weight (works everywhere); the memory cap is the guardrail that matters.
    mem_limit: 2g
    mem_reservation: 512m
    cpu_shares: 1024

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').getcode()==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - sitesweep_net

  # Cloudflare Tunnel — terminates auth (Cloudflare Access) and publishes the app.
  # In the Cloudflare Zero Trust dashboard, point this tunnel's public hostname
  # (e.g. sitesweep.catsec.com) to the origin service:  http://sitesweep:8000
  cloudflared:
    image: cloudflare/cloudflared:2026.5.2
    container_name: sitesweep-tunnel
    command: tunnel --no-autoupdate run

    # Token is read from .env (never commit it). TUNNEL_TOKEN keeps it out of
    # the process arguments (unlike passing --token on the command line).
    environment:
      TUNNEL_TOKEN: "${CF_TUNNEL_TOKEN:?set CF_TUNNEL_TOKEN in .env}"

    # --- hardening ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    privileged: false

    depends_on:
      sitesweep:
        condition: service_healthy

    mem_limit: 128m
    cpu_shares: 256

    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - sitesweep_net

networks:
  sitesweep_net:
    driver: bridge
